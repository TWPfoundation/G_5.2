<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G_5.2 - Authoring</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f13;--surface:#10171dcc;--surface2:#15202a;--surface3:#1d2a36;--border:#2a3a48;--text:#e6edf2;--dim:#93a3af;--blue:#5db0ff;--green:#87df82;--amber:#f5c17b;--violet:#c39bff;--danger:#ff8f8f;--radius:14px;--radiuslg:18px;--shadow:0 20px 45px rgba(0,0,0,.24)}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:Inter,sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(195,155,255,.10),transparent 28%),radial-gradient(circle at top right,rgba(135,223,130,.09),transparent 24%),linear-gradient(180deg,#0b1014 0%,#0a0f13 100%)}
.header{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:18px;height:58px;padding:0 28px;border-bottom:1px solid var(--border);background:#10171de6;backdrop-filter:blur(10px)}
.brand{display:flex;align-items:center;gap:12px;padding-right:20px;border-right:1px solid var(--border)}
.brand h1{margin:0;font-size:15px}
.tag{padding:3px 9px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(195,155,255,.16);color:var(--violet)}
.nav{display:flex;gap:6px}
.nav a{text-decoration:none;color:var(--dim);font-size:13px;font-weight:600;padding:8px 12px;border-radius:999px}
.nav a:hover{color:var(--text);background:rgba(255,255,255,.04)}
.nav a.active{color:var(--text);background:rgba(195,155,255,.16)}
.spacer{flex:1}
.pill{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.04);font-size:11px;color:var(--dim)}
.dot{width:8px;height:8px;border-radius:999px;background:var(--violet);box-shadow:0 0 10px rgba(195,155,255,.42)}
.layout{max-width:1500px;margin:0 auto;padding:24px 28px 32px;display:grid;grid-template-columns:340px minmax(0,1fr);gap:20px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radiuslg);box-shadow:var(--shadow)}
.sidebar,.workspace{min-height:calc(100vh - 114px);overflow:hidden}
.sidebar{display:flex;flex-direction:column}
.section{padding:18px 22px;border-bottom:1px solid var(--border)}
.eyebrow{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.section h2{margin:0 0 6px;font-size:16px}
.sub{font-size:12px;color:var(--dim);line-height:1.5}
.actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text);font-size:12px;font-weight:600;padding:7px 12px;border-radius:999px;cursor:pointer;font-family:inherit}
.btn:hover{background:rgba(255,255,255,.08)}
.btn.primary{background:linear-gradient(135deg,rgba(195,155,255,.32),rgba(195,155,255,.16));border-color:rgba(195,155,255,.4)}
.btn.primary:hover{background:linear-gradient(135deg,rgba(195,155,255,.42),rgba(195,155,255,.22))}
.btn.green{background:linear-gradient(135deg,rgba(135,223,130,.3),rgba(135,223,130,.14));border-color:rgba(135,223,130,.4)}
.btn.green:hover{background:linear-gradient(135deg,rgba(135,223,130,.4),rgba(135,223,130,.2))}
.btn.amber{background:linear-gradient(135deg,rgba(245,193,123,.3),rgba(245,193,123,.14));border-color:rgba(245,193,123,.4)}
.btn.quiet{background:transparent;color:var(--dim);font-weight:500}
.btn.quiet:hover{color:var(--text);background:rgba(255,255,255,.06)}
.btn.danger{color:var(--danger);border-color:rgba(255,143,143,.3)}
.btn.danger:hover{background:rgba(255,143,143,.1)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.input,.select,.textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none}
.input:focus,.select:focus,.textarea:focus{border-color:rgba(195,155,255,.45)}
.textarea{min-height:88px;resize:vertical;line-height:1.5;font-family:inherit}
.textarea.mono{font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.55}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.list{flex:1;overflow-y:auto;padding:14px 18px 20px}
.empty{font-size:12px;color:var(--dim);padding:16px;text-align:center;border:1px dashed var(--border);border-radius:12px}
.card{padding:13px;border:1px solid var(--border);background:var(--surface2);border-radius:12px;margin-bottom:10px;cursor:pointer;transition:border-color .12s,background .12s}
.card:hover{border-color:rgba(195,155,255,.3)}
.card.active{border-color:rgba(195,155,255,.55);background:rgba(195,155,255,.08)}
.card-meta{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;gap:6px}
.card-title{margin-top:6px;font-size:13.5px;font-weight:600;line-height:1.35}
.preview{margin-top:6px;font-size:12px;color:var(--dim);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.status{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.status.queued{background:rgba(147,163,175,.2);color:var(--dim)}
.status.drafted{background:rgba(93,176,255,.2);color:var(--blue)}
.status.draft{background:rgba(93,176,255,.2);color:var(--blue)}
.status.approved{background:rgba(135,223,130,.2);color:var(--green)}
.status.publishing_ready{background:rgba(245,193,123,.2);color:var(--amber)}
.status.archived{background:rgba(147,163,175,.18);color:var(--dim)}
.workspace{display:flex;flex-direction:column}
.ws-head{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.ws-head h2{margin:0;font-size:18px;flex:1;min-width:200px}
.ws-body{flex:1;overflow-y:auto;padding:22px 24px;display:flex;flex-direction:column;gap:18px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em}
.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;font-size:12px;color:var(--dim)}
.meta-grid b{color:var(--text);font-weight:600}
.tabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin-bottom:8px}
.tabs button{background:none;border:0;color:var(--dim);font-size:12px;font-weight:600;padding:8px 12px;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit}
.tabs button.active{color:var(--text);border-bottom-color:var(--violet)}
.runblock{padding:14px;border:1px solid var(--border);border-radius:12px;background:var(--surface2);margin-bottom:10px}
.runblock h4{margin:0 0 6px;font-size:13px;color:var(--violet);text-transform:uppercase;letter-spacing:.08em}
.runblock pre{margin:0;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.55;white-space:pre-wrap;color:var(--text)}
.toast{position:fixed;bottom:20px;right:24px;padding:10px 14px;border-radius:10px;background:var(--surface3);border:1px solid var(--border);font-size:12px;color:var(--text);box-shadow:var(--shadow);max-width:360px}
.toast.error{border-color:rgba(255,143,143,.4);color:var(--danger)}
.flex-tight{display:flex;gap:6px;flex-wrap:wrap}
.proposal-card{padding:12px 14px;border:1px solid rgba(245,193,123,.4);background:rgba(245,193,123,.08);border-radius:10px;font-size:12px;color:var(--amber)}
.proposal-card code{background:rgba(0,0,0,.25);padding:2px 6px;border-radius:5px;color:var(--text);font-size:11px}
.split{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:1100px){.split{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div class="brand"><h1>G_5.2</h1><span class="tag">Authoring</span></div>
  <nav class="nav"><a href="/">Reports</a><a href="/#diff-page">Diff</a><a href="/inquiry.html">Inquiry</a><a href="/authoring.html" class="active">Authoring</a></nav>
  <div class="spacer"></div>
  <div class="pill"><span class="dot"></span><span id="providerPill">Reflection authoring</span></div>
</div>
<div class="layout">
  <aside class="panel sidebar">
    <div class="section">
      <div class="eyebrow">Reflection</div>
      <h2>Topics</h2>
      <p class="sub">Each topic spawns a draft → critique → revise pass against active canon. Approval never mutates canon.</p>
      <div class="actions">
        <button class="btn primary" id="newTopicBtn">+ New topic</button>
        <button class="btn quiet" id="refreshBtn">Refresh</button>
      </div>
    </div>
    <div class="section" id="newTopicForm" style="display:none">
      <div class="field"><label>Title</label><input class="input" id="ntTitle" placeholder="On lineage"></div>
      <div class="field" style="margin-top:10px"><label>Prompt</label><textarea class="textarea" id="ntPrompt" placeholder="What does it mean to inherit a lineage without remembering it?"></textarea></div>
      <div class="field" style="margin-top:10px"><label>Notes (optional)</label><textarea class="textarea" id="ntNotes"></textarea></div>
      <div class="actions"><button class="btn primary" id="ntSave">Create</button><button class="btn quiet" id="ntCancel">Cancel</button></div>
    </div>
    <div class="list" id="topicList"><div class="empty">No topics yet.</div></div>
  </aside>
  <main class="panel workspace" id="workspace">
    <div class="ws-head"><h2>Select a topic to begin</h2></div>
    <div class="ws-body"><div class="empty">Pick or create a topic on the left to draft an authored artifact.</div></div>
  </main>
</div>
<div id="toast" class="toast" style="display:none"></div>
<script>
const state = { topics: [], topic: null, runs: [], artifacts: [], selectedArtifact: null, tab: 'artifacts' };

function toast(msg, isError){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  el.style.display = 'block';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { el.style.display='none'; }, 4200);
}

async function api(path, opts){
  const r = await fetch(path, opts);
  const text = await r.text();
  let body = null;
  try { body = text ? JSON.parse(text) : null; } catch { body = text; }
  if (!r.ok) {
    const msg = body && typeof body === 'object' && body.error ? body.error : `HTTP ${r.status}`;
    throw new Error(msg);
  }
  return body;
}

function fmtDate(s){ if(!s) return '—'; try { return new Date(s).toLocaleString(); } catch { return s; } }
function escapeHtml(s){ return (s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function loadTopics(){
  state.topics = await api('/api/reflection/topics');
  renderTopics();
}

function renderTopics(){
  const list = document.getElementById('topicList');
  if (!state.topics.length){ list.innerHTML = '<div class="empty">No topics yet.</div>'; return; }
  list.innerHTML = state.topics.map(t => `
    <div class="card ${state.topic && state.topic.id===t.id ? 'active':''}" data-id="${t.id}">
      <div class="card-meta">
        <span class="status ${t.state}">${t.state}</span>
        <span>${fmtDate(t.updatedAt)}</span>
      </div>
      <div class="card-title">${escapeHtml(t.title)}</div>
      <div class="preview">${escapeHtml(t.prompt)}</div>
    </div>`).join('');
  list.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click', () => selectTopic(c.dataset.id));
  });
}

async function selectTopic(id){
  try {
    const data = await api('/api/reflection/topics/' + id);
    state.topic = data.topic;
    state.runs = data.runs;
    const allArtifacts = await api('/api/artifacts?topicId=' + id);
    state.artifacts = allArtifacts;
    state.selectedArtifact = allArtifacts[0] || null;
    renderTopics();
    renderWorkspace();
  } catch (e) { toast(e.message, true); }
}

function renderWorkspace(){
  const ws = document.getElementById('workspace');
  const t = state.topic;
  if (!t){ ws.innerHTML = '<div class="ws-head"><h2>Select a topic to begin</h2></div><div class="ws-body"><div class="empty">Pick or create a topic on the left.</div></div>'; return; }
  ws.innerHTML = `
    <div class="ws-head">
      <h2>${escapeHtml(t.title)}</h2>
      <span class="status ${t.state}">${t.state}</span>
      <div class="row">
        <button class="btn primary" id="runBtn" ${t.state==='archived'?'disabled':''}>Run reflection</button>
        ${t.state!=='archived' ? '<button class="btn quiet" id="archiveTopicBtn">Archive topic</button>' : ''}
        <button class="btn quiet danger" id="deleteTopicBtn">Delete</button>
      </div>
    </div>
    <div class="ws-body">
      <div class="meta-grid">
        <div><b>Created</b><br>${fmtDate(t.createdAt)}</div>
        <div><b>Last run</b><br>${fmtDate(t.lastRunAt)}</div>
        <div><b>Runs</b><br>${state.runs.length}</div>
        <div><b>Artifacts</b><br>${state.artifacts.length}</div>
      </div>
      <div class="field"><label>Prompt</label><div class="runblock"><pre>${escapeHtml(t.prompt)}</pre></div></div>
      ${t.notes ? `<div class="field"><label>Notes</label><div class="runblock"><pre>${escapeHtml(t.notes)}</pre></div></div>` : ''}
      <div class="tabs">
        <button data-tab="artifacts" class="${state.tab==='artifacts'?'active':''}">Artifacts (${state.artifacts.length})</button>
        <button data-tab="runs" class="${state.tab==='runs'?'active':''}">Runs (${state.runs.length})</button>
      </div>
      <div id="tabContent"></div>
    </div>
  `;
  document.getElementById('runBtn').addEventListener('click', runReflection);
  const a = document.getElementById('archiveTopicBtn');
  if (a) a.addEventListener('click', archiveTopic);
  document.getElementById('deleteTopicBtn').addEventListener('click', deleteTopic);
  ws.querySelectorAll('.tabs button').forEach(b => b.addEventListener('click', () => { state.tab = b.dataset.tab; renderWorkspace(); }));
  renderTab();
}

function renderTab(){
  const el = document.getElementById('tabContent');
  if (!el) return;
  if (state.tab === 'artifacts') renderArtifactsTab(el);
  else renderRunsTab(el);
}

function renderArtifactsTab(el){
  if (!state.artifacts.length){ el.innerHTML = '<div class="empty">No artifacts yet. Run reflection to author one.</div>'; return; }
  const a = state.selectedArtifact || state.artifacts[0];
  el.innerHTML = `
    <div class="split">
      <div>
        ${state.artifacts.map(x => `
          <div class="card ${a.id===x.id?'active':''}" data-aid="${x.id}">
            <div class="card-meta">
              <span class="status ${x.status}">${x.status.replace('_',' ')}</span>
              <span>${fmtDate(x.metadata.revisionDate)}</span>
            </div>
            <div class="card-title">${escapeHtml(x.title)}</div>
            <div class="preview">${escapeHtml(x.body.slice(0,180))}</div>
          </div>`).join('')}
      </div>
      <div>${renderArtifactDetail(a)}</div>
    </div>`;
  el.querySelectorAll('[data-aid]').forEach(c => c.addEventListener('click', () => {
    state.selectedArtifact = state.artifacts.find(x => x.id===c.dataset.aid);
    renderTab();
  }));
  bindArtifactActions(a);
}

function renderArtifactDetail(a){
  if (!a) return '<div class="empty">No artifact selected.</div>';
  const m = a.metadata;
  const editable = a.status === 'draft';
  return `
    <div class="field"><label>Title</label>
      <input class="input" id="aTitle" value="${escapeHtml(a.title)}" ${editable?'':'disabled'}></div>
    <div class="field" style="margin-top:10px"><label>Body</label>
      <textarea class="textarea mono" id="aBody" style="min-height:240px" ${editable?'':'disabled'}>${escapeHtml(a.body)}</textarea></div>
    <div class="meta-grid" style="margin-top:12px">
      <div><b>Status</b><br><span class="status ${a.status}">${a.status.replace('_',' ')}</span></div>
      <div><b>Provider</b><br>${escapeHtml(m.provider.name)} / ${escapeHtml(m.provider.model)}</div>
      <div><b>Canon version</b><br>${escapeHtml(m.canonVersion)}</div>
      <div><b>Revised</b><br>${fmtDate(m.revisionDate)}</div>
      <div><b>Approved</b><br>${fmtDate(m.approvedAt)}${m.approvedBy?` by ${escapeHtml(m.approvedBy)}`:''}</div>
      <div><b>Sessions</b><br>${m.linkedSessionIds.length ? m.linkedSessionIds.map(escapeHtml).join(', ') : '—'}</div>
    </div>
    ${a.proposalRef ? `<div class="proposal-card" style="margin-top:12px">Proposed to canon as <code>${escapeHtml(a.proposalRef.proposalId)}</code> at <code>${escapeHtml(a.proposalRef.proposalPath)}</code> (still requires editorial review).</div>` : ''}
    <div class="actions" style="margin-top:14px">
      ${editable ? '<button class="btn primary" id="saveArtifactBtn">Save draft</button>' : ''}
      ${a.status==='draft' ? '<button class="btn green" id="approveBtn">Approve</button>' : ''}
      ${a.status==='approved' ? '<button class="btn amber" id="publishBtn">Mark publishing-ready</button>' : ''}
      ${(a.status==='approved'||a.status==='publishing_ready') && !a.proposalRef ? '<button class="btn primary" id="proposeBtn">Propose to canon</button>' : ''}
      ${a.status!=='archived' ? '<button class="btn quiet" id="archiveArtBtn">Archive</button>' : ''}
      <button class="btn quiet danger" id="deleteArtBtn">Delete</button>
    </div>`;
}

function bindArtifactActions(a){
  if (!a) return;
  const $ = id => document.getElementById(id);
  if ($('saveArtifactBtn')) $('saveArtifactBtn').onclick = async () => {
    try { const updated = await api('/api/artifacts/'+a.id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:$('aTitle').value, body:$('aBody').value})});
      mergeArtifact(updated); toast('Draft saved');
    } catch(e){ toast(e.message,true); }
  };
  if ($('approveBtn')) $('approveBtn').onclick = () => artifactAction(a, 'approve', { approvedBy: 'operator' }, 'Approved.');
  if ($('publishBtn')) $('publishBtn').onclick = () => artifactAction(a, 'publishing-ready', {}, 'Marked publishing-ready.');
  if ($('archiveArtBtn')) $('archiveArtBtn').onclick = async () => {
    const reason = prompt('Reason for archiving (optional)') || undefined;
    artifactAction(a, 'archive', { reason }, 'Archived.');
  };
  if ($('proposeBtn')) $('proposeBtn').onclick = async () => {
    const proposedChange = prompt('Describe the proposed change to canon (optional)') || undefined;
    try {
      const r = await api('/api/artifacts/'+a.id+'/propose-to-canon',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({proposedChange, proposedBy:'operator'})});
      mergeArtifact(r.artifact); toast('Proposal written: '+r.proposal.proposalId);
    } catch(e){ toast(e.message,true); }
  };
  if ($('deleteArtBtn')) $('deleteArtBtn').onclick = async () => {
    if (!confirm('Delete this artifact?')) return;
    try { await api('/api/artifacts/'+a.id,{method:'DELETE'});
      state.artifacts = state.artifacts.filter(x => x.id !== a.id);
      state.selectedArtifact = state.artifacts[0] || null;
      renderTab(); toast('Deleted.');
    } catch(e){ toast(e.message,true); }
  };
}

async function artifactAction(a, action, body, msg){
  try {
    const updated = await api('/api/artifacts/'+a.id+'/'+action,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});
    mergeArtifact(updated); toast(msg);
  } catch(e){ toast(e.message,true); }
}

function mergeArtifact(updated){
  const i = state.artifacts.findIndex(x => x.id === updated.id);
  if (i >= 0) state.artifacts[i] = updated;
  else state.artifacts.unshift(updated);
  if (state.selectedArtifact && state.selectedArtifact.id === updated.id) state.selectedArtifact = updated;
  renderTab();
}

function renderRunsTab(el){
  if (!state.runs.length){ el.innerHTML = '<div class="empty">No runs yet.</div>'; return; }
  el.innerHTML = state.runs.map(r => `
    <div class="runblock">
      <div class="card-meta"><span>${fmtDate(r.completedAt)}</span><span>${escapeHtml(r.provider.name)}/${escapeHtml(r.provider.model)} · canon ${escapeHtml(r.canonVersion)}</span></div>
      <h4 style="margin-top:10px">Draft</h4><pre>${escapeHtml(r.draft)}</pre>
      <h4 style="margin-top:14px">Critique</h4><pre>${escapeHtml(r.critique)}</pre>
      <h4 style="margin-top:14px">Revision (final)</h4><pre>${escapeHtml(r.revision)}</pre>
    </div>`).join('');
}

async function runReflection(){
  if (!state.topic) return;
  const btn = document.getElementById('runBtn');
  btn.disabled = true; btn.textContent = 'Running…';
  try {
    const r = await api('/api/reflection/topics/'+state.topic.id+'/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});
    state.topic = r.topic;
    state.runs = [r.run, ...state.runs];
    state.artifacts = [r.artifact, ...state.artifacts];
    state.selectedArtifact = r.artifact;
    state.tab = 'artifacts';
    renderTopics(); renderWorkspace();
    toast('Reflection complete.');
  } catch(e){ toast(e.message,true); btn.disabled=false; btn.textContent='Run reflection'; }
}

async function archiveTopic(){
  const reason = prompt('Reason for archiving (optional)') || undefined;
  try {
    state.topic = await api('/api/reflection/topics/'+state.topic.id+'/archive',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason})});
    await loadTopics();
    renderWorkspace(); toast('Topic archived.');
  } catch(e){ toast(e.message,true); }
}

async function deleteTopic(){
  if (!confirm('Delete this topic? Existing runs/artifacts will remain on disk.')) return;
  try {
    await api('/api/reflection/topics/'+state.topic.id,{method:'DELETE'});
    state.topic = null; state.runs = []; state.artifacts = []; state.selectedArtifact = null;
    await loadTopics(); renderWorkspace();
  } catch(e){ toast(e.message,true); }
}

document.getElementById('newTopicBtn').onclick = () => {
  document.getElementById('newTopicForm').style.display = 'block';
};
document.getElementById('ntCancel').onclick = () => {
  document.getElementById('newTopicForm').style.display = 'none';
};
document.getElementById('ntSave').onclick = async () => {
  const title = document.getElementById('ntTitle').value.trim();
  const prompt = document.getElementById('ntPrompt').value.trim();
  const notes = document.getElementById('ntNotes').value.trim();
  if (!title || !prompt) { toast('Title and prompt are required', true); return; }
  try {
    const t = await api('/api/reflection/topics',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,prompt,notes:notes||undefined})});
    document.getElementById('ntTitle').value=''; document.getElementById('ntPrompt').value=''; document.getElementById('ntNotes').value='';
    document.getElementById('newTopicForm').style.display='none';
    await loadTopics();
    selectTopic(t.id);
  } catch(e){ toast(e.message,true); }
};
document.getElementById('refreshBtn').onclick = loadTopics;

loadTopics().catch(e => toast(e.message,true));
</script>
</body>
